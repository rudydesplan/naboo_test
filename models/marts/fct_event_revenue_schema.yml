version: 2

models:
  - name: fct_event_revenue
    description: >
      Table de faits finale des revenus par proposition et par prestataire,
      exposée uniquement au stade de facturation le plus avancé atteint pour
      chaque proposition.

      Le grain est :
      1 ligne = 1 client_proposal_id × 1 service_owner_id
      pour le quote_stage retenu comme le plus avancé.

      Le modèle reprend les métriques financières agrégées calculées dans
      pre_fct_event_revenue, puis filtre pour ne conserver que le stade final
      par proposition selon :
      - billing_stage_rank le plus élevé
      - puis current_quote_created_at le plus récent
      - puis current_quote_id comme tie-breaker final

    tests:
      - dbt_utils.expression_is_true:
          expression: "client_proposal_quote_role = upper(client_proposal_quote_role)"

      - dbt_utils.expression_is_true:
          expression: "billing_stage = upper(billing_stage)"

      - dbt_utils.expression_is_true:
          expression: "current_quote_payment_type = upper(current_quote_payment_type)"

      - dbt_utils.expression_is_true:
          expression: "current_quote_status = upper(current_quote_status)"

      - dbt_utils.expression_is_true:
          expression: "pricing_item_count >= 1"

      - dbt_utils.expression_is_true:
          expression: "service_line_count >= 0"

      - dbt_utils.expression_is_true:
          expression: "client_fee_line_count >= 0"

      - dbt_utils.expression_is_true:
          expression: "partner_commission_line_count >= 0"

      - dbt_utils.expression_is_true:
          expression: "pricing_stage_count >= 1"

      - dbt_utils.expression_is_true:
          expression: "max_pricing_stage_rank >= 1"

      - dbt_utils.expression_is_true:
          expression: "gmv_with_client_fees = gmv_service_net + naboo_client_fees"

      - dbt_utils.expression_is_true:
          expression: "total_margin = naboo_client_fees + naboo_partner_commission"

      - dbt_utils.expression_is_true:
          expression: "supplier_net_payout = gmv_service_net - naboo_partner_commission"

      - dbt_utils.expression_is_true:
          expression: "service_gross_amount = gmv_service_net + total_discount"

    columns:
      - name: event_revenue_key
        description: >
          Clé surrogate technique de la ligne de revenu finale, héritée de
          pre_fct_event_revenue et construite à partir de quote_stage_key et
          service_owner_id.
        tests:
          - not_null
          - unique

      - name: quote_stage_key
        description: >
          Clé du stade de quote retenu comme le plus avancé pour la proposition.
        tests:
          - not_null

      - name: client_proposal_id
        description: Identifiant de la proposition client.
        tests:
          - not_null

      - name: client_request_id
        description: Identifiant de la demande client associée à la proposition.
        tests:
          - not_null

      - name: client_request_company_id
        description: Identifiant de l’entreprise ayant émis la demande client.

      - name: client_request_company_name
        description: Nom de l’entreprise ayant émis la demande client.

      - name: client_proposal_house_id
        description: Identifiant du lieu proposé.
        tests:
          - not_null

      - name: service_owner_id
        description: >
          Identifiant du prestataire / propriétaire de la ligne de revenu.
        tests:
          - not_null

      - name: client_proposal_status
        description: Statut métier de la proposition.
        tests:
          - not_null

      - name: client_proposal_start_at
        description: Date et heure de début de l’événement proposé.

      - name: client_proposal_end_at
        description: Date et heure de fin de l’événement proposé.

      - name: client_proposal_participants_count
        description: Nombre de participants prévu pour la proposition.

      - name: client_proposal_quote_role
        description: >
          Rôle/stade métier du quote sélectionné pour la proposition.
        tests:
          - not_null
          - accepted_values:
              values: ['DEPOSIT', 'BALANCE', 'POST_BALANCE']

      - name: billing_stage
        description: >
          Stade de facturation retenu pour la ligne finale.
        tests:
          - not_null
          - accepted_values:
              values: ['DEPOSIT', 'BALANCE', 'POST_BALANCE']

      - name: billing_stage_rank
        description: >
          Rang ordinal du stade de facturation retenu :
          1 = DEPOSIT, 2 = BALANCE, 3 = POST_BALANCE.
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]
              quote: false

      - name: billing_stage_label
        description: >
          Libellé lisible du stade de facturation retenu.
        tests:
          - not_null
          - accepted_values:
              values: ['Deposit', 'Balance', 'Post balance']

      - name: client_proposal_quote_key
        description: Clé surrogate de la proposition-quote retenue.
        tests:
          - not_null

      - name: current_quote_id
        description: Identifiant du quote retenu comme stade final.
        tests:
          - not_null

      - name: current_quote_client_request_id
        description: Identifiant de demande porté par le quote courant.

      - name: current_quote_house_id
        description: Identifiant de lieu porté par le quote courant.

      - name: current_quote_payment_type
        description: Type de paiement du quote courant.
        tests:
          - not_null
          - accepted_values:
              values: ['DEPOSIT', 'BALANCE', 'POST_BALANCE']

      - name: current_quote_status
        description: Statut du quote courant.
        tests:
          - not_null

      - name: current_quote_deposit_rate
        description: Taux d’acompte du quote courant.

      - name: current_quote_start_at
        description: Date de début portée par le quote courant.

      - name: current_quote_end_at
        description: Date de fin portée par le quote courant.

      - name: current_quote_created_at
        description: Date de création du quote courant.
        tests:
          - not_null

      - name: pricing_item_count
        description: Nombre total de lignes tarifaires agrégées dans la ligne finale.
        tests:
          - not_null

      - name: service_line_count
        description: Nombre de lignes de service agrégées.
        tests:
          - not_null

      - name: client_fee_line_count
        description: Nombre de lignes de frais client Naboo agrégées.
        tests:
          - not_null

      - name: partner_commission_line_count
        description: Nombre de lignes de commission partenaire Naboo agrégées.
        tests:
          - not_null

      - name: max_pricing_stage_rank
        description: Rang maximal observé parmi les pricing stages agrégés.
        tests:
          - not_null

      - name: pricing_stage_count
        description: Nombre de pricing stages distincts agrégés.
        tests:
          - not_null

      - name: gmv_service_net
        description: >
          GMV net, soit ce que le client paie hors frais client Naboo,
          après prise en compte des remises.
        tests:
          - not_null

      - name: gmv_with_client_fees
        description: >
          GMV brut, soit ce que le client paie au total, frais client Naboo inclus.
        tests:
          - not_null

      - name: naboo_client_fees
        description: Montant total des frais Naboo côté client.
        tests:
          - not_null

      - name: naboo_partner_commission
        description: Montant total de la commission Naboo côté partenaire.
        tests:
          - not_null

      - name: total_margin
        description: >
          Marge totale Naboo, égale à la somme des frais client et de la
          commission partenaire.
        tests:
          - not_null

      - name: supplier_net_payout
        description: >
          Montant net revenant au prestataire après déduction de la commission
          partenaire Naboo.
        tests:
          - not_null

      - name: total_discount
        description: Montant total des remises accordées.
        tests:
          - not_null

      - name: service_gross_amount
        description: >
          Montant brut des services avant remise.
        tests:
          - not_null

      - name: is_quote_role_consistent
        description: >
          Indique si le rôle du quote est cohérent avec le stade retenu.
        tests:
          - not_null

      - name: is_request_consistent
        description: >
          Indique si les identifiants de demande sont cohérents entre les sources.
        tests:
          - not_null

      - name: is_house_consistent
        description: >
          Indique si les identifiants de lieu sont cohérents entre les sources.
        tests:
          - not_null

      - name: is_source_client_proposal_id_consistent
        description: >
          Indique si l’identifiant de proposition source est cohérent dans les lignes tarifaires.
        tests:
          - not_null

      - name: is_billing_stage_known
        description: >
          Indique si le stade de facturation retenu est reconnu.
        tests:
          - not_null

      - name: is_pricing_stage_known
        description: >
          Indique si tous les pricing stages agrégés sont reconnus.
        tests:
          - not_null

      - name: is_quote_data_quality_valid
        description: >
          Indique si aucune anomalie de qualité n’a été détectée sur les données quote.
        tests:
          - not_null

      - name: is_current_quote_pricing_item_data_quality_valid
        description: >
          Indique si aucune anomalie de qualité n’a été détectée sur les pricing items
          du quote courant.
        tests:
          - not_null

      - name: is_revenue_component_data_quality_valid
        description: >
          Indique si aucune anomalie de qualité n’a été détectée dans les composantes de revenu.
        tests:
          - not_null

      - name: has_data_quality_issue
        description: >
          Flag synthétique indiquant qu’au moins un contrôle de qualité ou de cohérence
          métier a échoué sur la ligne finale.
        tests:
          - not_null